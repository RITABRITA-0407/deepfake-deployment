# Dataset paths (adjust if your structure is different)
train_paths:
  - data/train
val_paths:
  - data/valid
test_paths:
  - data/test

# Model parameters
model:
  name: efficientnet_b4
  pretrained: true      # Use ImageNet weights
  dropout: 0.5          # Regularization
  num_classes: 2        # Real vs Fake

# Training parameters
training:
  learning_rate: 0.0001
  batch_size: 12
  num_epochs: 20
  early_stopping_patience: 5
  weight_decay: 0.0001

# Data parameters
data:
  image_size: 380        # EfficientNet-B4 standard size
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

# Inference parameters
inference:
  confidence_threshold: 0.65
  device: auto  # 'cuda' or 'cpu' or 'auto'

# Logging
logging:
  log_dir: logs
  checkpoint_dir: models
  save_top_k: 1